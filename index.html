<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Telegram Sender</title>

<style>

body{
    background:#111;
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    background:#1e1e1e;
    padding:25px;
    border-radius:15px;
    width:330px;
    text-align:center;
}

textarea,input{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:#2b2b2b;
    color:white;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:8px;
    background:#00aaff;
    color:white;
    font-size:16px;
    cursor:pointer;
}

</style>
</head>

<body>

<div class="box">

<h2>إرسال إلى تيليجرام</h2>

<textarea id="message"
placeholder="اكتب أي رسالة"></textarea>

<input type="file" id="file">

<button onclick="sendAll()">
إرسال
</button>

<p id="status"></p>

</div>

<script>

const BOT_TOKEN = "PUT_BOT_TOKEN"
const CHAT_ID = "PUT_CHAT_ID"

async function sendAll(){

    let text = document.getElementById("message").value

    let file = document.getElementById("file").files[0]

    // إرسال النص
    if(text){

        await fetch(
        `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`,
        {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                chat_id:CHAT_ID,
                text:text
            })
        })
    }

    // إرسال الملف
    if(file){

        let data = new FormData()

        data.append("chat_id", CHAT_ID)
        data.append("document", file)

        await fetch(
        `https://api.telegram.org/bot${BOT_TOKEN}/sendDocument`,
        {
            method:"POST",
            body:data
        })
    }

    document.getElementById("status").innerHTML =
    "تم الإرسال للبوت"
}

</script>

</body>
</html>
